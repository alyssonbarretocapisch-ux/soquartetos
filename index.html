<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Só Quartetos</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-sidebar: #000000;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --spotify-green: #1DB954;
            --text-main: #FFFFFF;
            --text-muted: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column; /* Base flex adaptável */
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: calc(100vh - 120px);
        }

        /* Sidebar - Layout Desktop */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--spotify-green);
            cursor: pointer;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 70vh;
            overflow-y: auto;
            margin-top: 5px;
        }

        .nav-links li {
            padding: 8px 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-links li:hover, .nav-links li.active {
            color: var(--text-main);
            background-color: var(--bg-card-hover);
        }

        /* Conteúdo Principal */
        .main-content {
            flex: 1;
            background: linear-gradient(to bottom, #222 0%, var(--bg-main) 300px);
            padding: 30px;
            overflow-y: auto;
        }

        .header-area {
            margin-bottom: 30px;
        }

        .header-area h2 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .section-shelf {
            margin-bottom: 40px;
        }

        .section-shelf h3 {
            font-size: 22px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        /* Grid de Álbuns Inteligente (Auto-Fill) */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--bg-card);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .card:hover {
            background-color: var(--bg-card-hover);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tabela de Faixas Responsiva */
        .track-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .track-list th {
            text-align: left;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #282828;
            padding: 10px;
        }

        .track-row {
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .track-row:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .track-row td {
            padding: 12px 10px;
            font-size: 14px;
            vertical-align: middle;
        }

        .track-num {
            color: var(--text-muted);
            width: 30px;
        }

        .track-title {
            font-weight: 600;
        }

        .btn-download {
            background-color: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            display: inline-block;
        }

        .btn-download:hover {
            border-color: var(--text-main);
            background-color: #fff;
            color: #000;
        }

        /* Player Fixo Inferior - Desktop */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background-color: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            z-index: 100;
            gap: 20px;
        }

        .now-playing {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 25%;
            min-width: 150px;
        }

        .now-playing h4 {
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing p {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .iframe-container {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            font-style: italic;
            text-align: center;
            padding: 0 10px;
        }

        /* ==========================================
           MEDIA QUERIES (TABLETS E CELULARES)
        ========================================== */

        /* Tablets (Telas de até 900px) */
        @media (max-width: 900px) {
            .sidebar {
                width: 200px;
                padding: 15px;
            }
            .header-area h2 {
                font-size: 26px;
            }
            .album-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        /* Celulares (Telas de até 650px) */
        @media (max-width: 650px) {
            body {
                overflow-y: auto;
            }

            .container {
                flex-direction: column; /* Empilha a barra lateral no topo */
                height: auto;
                margin-bottom: 160px; /* Dá espaço para o player mobile maior */
            }

            /* Transforma a Sidebar em um menu horizontal no topo */
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px;
                gap: 10px;
                border-bottom: 1px solid #282828;
            }

            .logo {
                font-size: 20px;
                margin-bottom: 0;
                text-align: center;
            }

            .section-title {
                display: none; /* Esconde os títulos fixos "Artistas" para poupar espaço */
            }

            .nav-links {
                flex-direction: row; /* Coloca os links lado a lado */
                overflow-x: auto; /* Permite rolar os artistas para o lado se faltar espaço */
                max-height: none;
                padding-bottom: 5px;
            }

            .nav-links li {
                padding: 6px 12px;
                font-size: 13px;
            }

            /* Área de Conteúdo Mobile */
            .main-content {
                padding: 20px 15px;
                background: var(--bg-main);
            }

            .header-area h2 {
                font-size: 24px;
            }

            .section-shelf h3 {
                font-size: 18px;
            }

            .album-grid {
                grid-template-columns: repeat(2, 1fr); /* Força exatamente 2 colunas nos celulares */
                gap: 12px;
            }

            .card {
                padding: 10px;
            }

            .card-title {
                font-size: 14px;
            }

            /* Ajustes na Tabela de Faixas para Telas Pequenas */
            .track-list th:nth-child(1), 
            .track-list td:nth-child(1) {
                width: 20px; /* Encolhe a coluna do número */
            }

            .track-row td {
                padding: 10px 5px;
                font-size: 13px;
            }

            /* Player Mobile Redesenhado (Empilhado) */
            .player-bar {
                flex-direction: column;
                height: 150px; /* Mais alto para caber as informações + iframe sem esmagar */
                justify-content: center;
                padding: 10px;
                gap: 8px;
            }

            .now-playing {
                width: 100%;
                text-align: center;
                min-width: unset;
            }

            .now-playing h4 {
                font-size: 13px;
            }

            .iframe-container {
                width: 100%;
                height: 80px; /* Define altura fixa e confortável para o player do drive/onedrive */
            }
        }
    </style>
</head>

        const navLinksContainer = document.querySelector('.nav-links');
        const contentHeader = document.getElementById('contentHeader');
        const displayArea = document.getElementById('displayArea');
        const playerTarget = document.getElementById('playerTarget');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtistAndAlbum = document.getElementById('currentArtistAndAlbum');
        const btnInicio = document.getElementById('btnInicio');

        // Renderiza a sidebar mantendo o botão "Início" estático no topo/esquerda
        function renderizarSidebar() {
            // Remove os li de artistas antigos para não duplicar, mantendo apenas o botão início
            const artistasAntigos = navLinksContainer.querySelectorAll('.artist-item');
            artistasAntigos.forEach(item => item.remove());

            biblioteca.forEach((artista, index) => {
                const li = document.createElement('li');
                li.textContent = artista.nome;
                li.className = 'artist-item';
                li.onclick = () => selecionarArtista(index, li);
                navLinksContainer.appendChild(li);
            });
        }

        // Renderiza a Tela Inicial (Home)
        function renderizarHome() {
            document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
            btnInicio.classList.add('active');

            contentHeader.innerHTML = `
                <h2>Boa noite</h2>
                <p>Explore o seu streaming de áudio particular</p>
            `;

            let htmlHome = `
                <div class="section-shelf">
                    <h3>Últimos lançamentos</h3>
                    <div class="album-grid" id="lancamentosGrid"></div>
                </div>

                <div class="section-shelf">
                    <h3>Todos os álbuns</h3>
                    <div class="album-grid" id="todosGrid"></div>
                </div>
            `;
            
            displayArea.innerHTML = htmlHome;

            const lancamentosGrid = document.getElementById('lancamentosGrid');
            const todosGrid = document.getElementById('todosGrid');

            biblioteca.forEach(artista => {
                artista.albuns.forEach(album => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => mostrarFaixas(artista.nome, album);
                    card.innerHTML = `
                        <img src="${album.capa}" alt="${album.titulo}">
                        <div class="card-title">${album.titulo}</div>
                        <div class="card-subtitle">${artista.nome}</div>
                    `;

                    if (album.lancamento) {
                        const cloneCard = card.cloneNode(true);
                        cloneCard.onclick = () => mostrarFaixas(artista.nome, album);
                        lancamentosGrid.appendChild(cloneCard);
                    }
                    
                    todosGrid.appendChild(card);
                });
            });
        }

        // Filtrar por Artista
        function selecionarArtista(indexArtista, elementoLi) {
            document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
            elementoLi.classList.add('active');

            const artista = biblioteca[indexArtista];
            
            contentHeader.innerHTML = `
                <h2>${artista.nome}</h2>
                <p>Todos os álbuns deste artista</p>
            `;

            displayArea.innerHTML = `<div class="album-grid"></div>`;
            const grid = displayArea.querySelector('.album-grid');

            artista.albuns.forEach(album => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => mostrarFaixas(artista.nome, album);
                card.innerHTML = `
                    <img src="${album.capa}" alt="${album.titulo}">
                    <div class="card-title">${album.titulo}</div>
                    <div class="card-subtitle">Álbum</div>
                `;
                grid.appendChild(card);
            });
        }

        // Mostrar as músicas do Álbum
        function mostrarFaixas(nomeArtista, album) {
            contentHeader.innerHTML = `
                <h2>${album.titulo}</h2>
                <p>Álbum de <strong>${nomeArtista}</strong></p>
            `;

            let tabelaHTML = `
                <table class="track-list">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Título</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            album.faixas.forEach(faixa => {
                tabelaHTML += `
                    <tr class="track-row" onclick="tocarFaixa('${faixa.titulo}', '${nomeArtista}', '${album.titulo}', '${faixa.iframeUrl}')">
                        <td class="track-num">${faixa.num}</td>
                        <td class="track-title">${faixa.titulo}</td>
                        <td>
                            <a href="${faixa.downloadUrl}" target="_blank" class="btn-download" onclick="event.stopPropagation();">Baixar</a>
                        </td>
                    </tr>
                `;
            });

            tabelaHTML += `
                    </tbody>
                </table>
            `;

            displayArea.innerHTML = tabelaHTML;
        }

        // Executa o player
        function tocarFaixa(titulo, artista, album, iframeUrl) {
            currentTitle.textContent = titulo;
            currentArtistAndAlbum.textContent = `${artista} • ${album}`;
            
            playerTarget.innerHTML = `
                <iframe 
                    src="${iframeUrl}" 
                    allow="autoplay" 
                    allowfullscreen>
                </iframe>
            `;
        }

        // Inicialização
        renderizarSidebar();
        renderizarHome();
    </script>
